      <section class="app-view" id="manageView" data-view="manage">

        </main>
      </section>
    </div>

    <nav class="bottom-nav" id="bottomNav">

    </nav>

        <div class="manage-edit-header">

          </div>
          <button class="manage-edit-close" type="button" id="closeSheet" aria-label="Close">×</button>
        </div>
        <div class="gd-sheet-actions" id="manageSheetActions"></div>
        <button class="cr-button save" type="button" id="saveSheet">Save Picks</button>

    </div>
